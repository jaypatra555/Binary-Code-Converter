<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number System Calculator</title>
    <link rel="stylesheet" href="style/all-in-one.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <h1> All in One Calculator</h1>
    </header>


    <main>

        <!-- back button -->
        <div class="back-button-box">
            <button class="back-button"  onclick="goBack()">
            <i id="logo" class="fa-solid fa-arrow-left"></i>
            </button>
        </div>

        <!-- Number 1 -->
        <div class="all-num1-2-box">
            <div class="num1-2-box">
            <h3>Number 1</h3>

            <select id="base1" class="number-select">
                <option value="binary">Binary</option>
                <option value="decimal" selected>Decimal</option>
                <option value="octal">Octal</option>
                <option value="hexadecimal">Hexadecimal</option>
                <option value="bcd">BCD</option>
                <option value="xs3">XS-3</option>
                <option value="gray">Gray Code</option>
            </select>
            </div>
            <input type="text" class="number-input" id="num1" placeholder="Enter Number">

        </div>

        <br>

        <!-- Operation -->
        <div class="operation-box">
            <select id="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
        </div>

        <br>

        <!-- Number 2 -->
        <div class="all-num1-2-box">
            <div class="num1-2-box">
                <h3>Number 2</h3>
 
                <select id="base2" class="number-select" >
                    <option value="binary">Binary</option>
                    <option value="decimal" selected>Decimal</option>
                    <option value="octal">Octal</option>
                    <option value="hexadecimal">Hexadecimal</option>
                    <option value="bcd">BCD</option>
                    <option value="xs3">XS-3</option>
                    <option value="gray">Gray Code</option>
                </select>
            </div>
            <input type="text" class="number-input" id="num2" placeholder="Enter Number">

        </div>

        <br>

        <!-- Result -->
        <div class="all-result-box">
            <div class="num1-2-box">
                <h3>Result</h3>

                <select id="resultBase" class="number-select">
                    <option value="binary">Binary</option>
                    <option value="decimal" selected>Decimal</option>
                    <option value="octal">Octal</option>
                    <option value="hexadecimal">Hexadecimal</option>
                    <option value="bcd">BCD</option>
                    <option value="xs3">XS-3</option>
                    <option value="gray">Gray Code</option>
                </select>
            </div>

            <input type="text" placeholder="RESULT" id="result" readonly>

        </div>

        <br>

        <!-- Process Box -->
        <div class="process-box">
            <h2>Process:</h2>

            <div id="process">
                Calculation steps will appear here.
            </div>
        </div>

    </main>


    <script src="script/all-in-one.js"></script>

    
</body>
</html>
